<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <a href="index.html">Home</a>
    <a href="Mood-check.html">Mood</a>
    <a href="Support.html">Support</a>
    <a href="Booking.html">Booking</a>
    <a href="Confirmation.html">Confirmation</a>
    <a href="Admin.html">Admin features</a>
  </header>

  <!-- MAIN CONTENT -->
  <main style="padding: 20px; text-align: center;">

    <h1>Admin Dashboard</h1>
    <p>Overview of user activity</p>

    <!-- Mood Section -->
    <div class="card">
      <h3>User Mood</h3>
      <p id="Mood">Loading...</p>
    </div>

    <!-- Appointment Section -->
    <div class="card">
      <h3>Appointments</h3>
      <div id="Appointments">Loading...</div>
    </div>

  </main>

  <!-- FOOTER
  <footer class="footer">
    <p>© 2026 Mental Health Support Platform</p>
    <p>Your wellbeing matters </p>
  </footer> -->

  <!-- JAVASCRIPT -->
  <script>
    // Get mood
    let Mood = localStorage.getItem("mood");

    if (mood) {
      document.getElementById("mood").innerText = mood;
    } else {
      document.getElementById("mood").innerText = "No mood recorded";
    }

    // Get appointment
    let data = JSON.parse(localStorage.getItem("Appointments"));

    if (data) {
      document.getElementById("Appointments").innerHTML = `
        Name: ${data.name} <br>
        Date: ${data.date} <br>
        Time: ${data.time} <br>
        Doctor: ${data.doctor}
      `;
    } else {
      document.getElementById("Appointments").innerText = "No Bookings yet";
    }
  </script>
  <script src="index.js"></script>
<!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 Mental Health Support</p>
    <p>Your are not alone </p>
  </footer>

</body>
</html>
