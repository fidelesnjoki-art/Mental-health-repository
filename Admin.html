<body>
<div class="container">
<main class="main-content">
<div class="card-container">
    <h1>Admin Dashboard - Appointments</h1>

<div id="appointments" class="appointments-grid"></div>
</main>
</div>
</div>
<script>
function loadAppointments() {

    let data = JSON.parse(localStorage.getItem("appointments")) || [];

    let container = document.getElementById("appointments");

    if (data.length === 0) {
        container.innerHTML = "<p>No appointments yet</p>";
        return;
    }

    container.innerHTML = "";

    data.forEach(a => {
        container.innerHTML += `
            <div class="appointment-card">
                <h3>${a.doctor}</h3>
                <p><strong>Name:</strong> ${a.name}</p>
                <p><strong>Date & Time:</strong> ${a.datetime}</p>
                <p><strong>Booked At:</strong> ${a.createdAt}</p>
            </div>
        `;
    });
}

loadAppointments();
</script>

<footer class="footer">
  <p>© 2026 Mental Health Support</p>
  <p>You are not alone </p>
</footer>

</body>
</html>
